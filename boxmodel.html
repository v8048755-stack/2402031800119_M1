<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
         position: relative;
  top: 20px;
  left: 30px;
  background-color: lightblue;
        }
        h2{
            position: absolute;
  top: 10px;
  right: 10px;
  background-color: coral;
        }
        h3{
             position: fixed;
  top: 10;
  width: 100%;
  background-color: #333;
  color: white;
        }
    </style>
</head>
<body>
    <h1>hello</h1>
    <h2>hello</h2>

    <h3>hello</h3>
</body>
</html>
