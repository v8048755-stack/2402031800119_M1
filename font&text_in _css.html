<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p,h1{
            font-size: larger;
            font-style: oblique;
            font-family: 'Courier New', Courier, monospace;
            color: brown;
            text-align: center;
            text-decoration: double;
            text-overflow: clip;
            text-transform: capitalize;
            text-decoration-line:underline;
        }
        h2{
            text-decoration-line: line-through;
        }
        #p1{
            letter-spacing: 2cap;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>
    <p>this the end</p>
    <h2>Hello world</h2>
    <p id="p1">abcdefg</p>
</body>
</html>
