<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <title>Registration Form</title>
    <h1 align="center">Registration Form</h1>
    <table border="2" align="center" style="background-color: rgb(144, 147, 187);">
        <tr>
            <td><label for="name">first Name:</label></td>
            <td><input type='text' name="name" placeholder="Enter first Name" ></td>
        </tr>
         <tr>
            <td><label for="lname">last Name:</label></td>
            <td><input type='text' name="lname" placeholder="Enter lasr Name" ></td>
        </tr>
        <tr>
            <td><label for="phone">phone number :</label></td>
            <td><input type='text' name="phone" placeholder="Enter phone number" ></td>
        </tr>
        <tr>
            <td><label for="email">Eamil :</label></td>
            <td><input type='email' name="eamil" placeholder="Enter Eamil" ></td>
        </tr>
        <tr>
            <td><label for="pas">password  :</label></td>
            <td><input type='text' name="pas" placeholder="Enter password" ></td>
        </tr>
        <tr>
            <td><label for="bri">Date of Birth :</label></td>
            <td><input type='date' name="bri" placeholder="Date of Birth " ></td>
        </tr>

         <tr>
            <td><label for="age">Age :</label></td>
            <td><input type='text' name="Age" placeholder="Enter Age" ></td>
        </tr>
        <tr>
            <td><label for="gen">Gender :</label></td>
            <td><input type='radio' name="gen" value="Male" >Male
            <input type='radio' name="gen" value="Female" >Female
            </td>
        </tr>
        <tr>
            <td><label for="add">Address  :</label></td>
            <td><textarea name="add" id="1" placeholder="Enter Address"></textarea></td>
        </tr>
        <tr>
            <td><label for="cit">City :</label></td>
            <td><select name="city">
                <option value="">select city</option>
                <option value="mumbai">mumbai</option>
                <option value="dehgam">dehgam</option>
            </select></td>
        </tr>
        <tr>
            <td><label for="pincode">pincode  :</label></td>
            <td><input type='text' name="pincode" placeholder="Enter pincode" ></td>
        </tr>
        <tr>
            <td><label for="Joining">Joining  Date:</label></td>
            <td><input type='date' name="Joining" placeholder="Joining  Date " ></td>
        </tr>
        <tr>
            <td>comform your form</td>
            <td><button type="submit">submit</button>
                <button type="reset">reset</button></td>
        </tr>
    </table>
</body>
</html>
